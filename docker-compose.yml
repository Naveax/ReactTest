services:
  mongodb:
    image: mongo:7
    container_name: certificate-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: certificate-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    profiles:
      - tools
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/

volumes:
  mongo_data:
